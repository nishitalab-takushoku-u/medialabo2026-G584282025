<!-- 課題1-4: プロジェクト課題の検索結果を表示する HTML をここに記述してください．-->
 <!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>プロジェクト課題</title>
    <link rel="stylesheet" href="project.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.27.2/axios.min.js"></script>
    <script src="tv-program.js" defer></script>
  </head>
  <body>
    <h1>NHK の番組表</h1>
     <label for="genreSelect">ジャンル</label>
      <select name="genreSelect" id="genreSelect">
        <option value="all">全て</option>
        <option value="0000">ニュース・報道</option>
        <option value="0100">スポーツ</option>
        <option value="0205">情報・ワイドショー</option>
        <option value="0300">ドラマ</option>
        <option value="0409">音楽</option>
        <option value="0502">バラエティ</option>
        <option value="0600">映画</option>
        <option value="0700">アニメ</option>
        <option value="0800">ドキュメンタリー・教養</option>
        <option value="0903">劇場・公演</option>
        <option value="1000">趣味・教育</option>
        <option value="1100">福祉</option>        
      </select>
    <h3>チャンネル</h3>
    <input type="checkbox" name="channel" id="g1" value="g1">
    <label for="g1">NHK総合1</label>
    <input type="checkbox" name="channel" id="e1" value="e1">
    <label for="e1">NHK Eテレ1</label><br><br>
    <button id="kensaku">検索</button>
    <h1>番組表の検索結果</h1>
    <p>（検索結果は<span id="kensu">-</span>件） </p>
  </body>
</html>
